<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>La Tito Map</title>
    <meta
      name="description"
      content="Trova i locali aderenti a La Tito, consulta informazioni utili e apri la navigazione in Google Maps."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;700;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="/assets/styles.css" />
    <script>
      if (window.location.hash.includes("recovery_token=")) {
        window.location.replace(`/admin/${window.location.hash}`);
      }
    </script>
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="brand-row">
          <div class="hero-brand">
            <img
              src="/assets/la-tito-logo.png"
              alt="La Tito"
              class="hero-logo"
            />
            <h1 id="hero-title">la birra ufficiale di san tito 2026</h1>
          </div>
          <nav class="language-switcher" aria-label="Selettore lingua">
            <button type="button" data-lang="it" class="is-active">IT</button>
            <button type="button" data-lang="en">EN</button>
            <button type="button" data-lang="es">ES</button>
          </nav>
        </div>
        <div class="hero-card">
          <div class="hero-copy">
            <p class="hero-kicker" id="beer-heading">In primo piano</p>
            <h2 id="beer-title"></h2>
            <p id="beer-description"></p>
          </div>
          <div class="hero-actions">
            <a id="hero-cta" class="primary-link" href="#map-section"></a>
            <p class="support-note" id="hero-support"></p>
          </div>
        </div>
      </header>

      <main>
        <section id="map-section" class="map-section">
          <div class="section-heading">
            <div>
              <p class="eyebrow" id="map-eyebrow"></p>
              <h2 id="map-title"></h2>
            </div>
            <p id="map-subtitle" class="section-copy"></p>
          </div>
          <div id="map" class="map-frame" aria-label="Mappa locali La Tito"></div>
        </section>
      </main>
    </div>

    <aside class="sheet" id="location-sheet" aria-hidden="true">
      <button type="button" class="sheet-close" id="sheet-close" aria-label="Chiudi">
        ×
      </button>
      <div class="sheet-inner">
        <img id="sheet-photo" class="sheet-photo" alt="" hidden />
        <p class="sheet-eyebrow" id="sheet-category"></p>
        <h3 id="sheet-name"></h3>
        <p id="sheet-address" class="sheet-address"></p>

        <div class="sheet-grid">
          <section>
            <h4 id="label-info"></h4>
            <p id="sheet-info"></p>
          </section>
          <section>
            <h4 id="label-contact"></h4>
            <div id="sheet-contact" class="contact-list"></div>
          </section>
          <section>
            <h4 id="label-hours"></h4>
            <p id="sheet-hours"></p>
          </section>
        </div>

        <div class="sheet-actions">
          <a id="maps-link" class="action-button" target="_blank" rel="noreferrer"></a>
          <a id="menu-link" class="ghost-button" target="_blank" rel="noreferrer" hidden></a>
        </div>
      </div>
    </aside>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="/assets/app.js"></script>
  </body>
</html>
